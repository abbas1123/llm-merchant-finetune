name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint
        run: ruff check .

      - name: Test
        # model-dependent tests are marked "local" and skip themselves in CI
        run: pytest -q
